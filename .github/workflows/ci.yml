name: CI

on:
  push:
    branches: 
      - master
      - develop
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches: 
      - master
      - develop

jobs:
  # 编译阶段
  compile:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile with Maven
      run: mvn clean compile -B

  # 单元测试
  unit-tests:
    runs-on: ubuntu-latest
    needs: compile
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Run unit tests
      run: mvn clean test -B
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
    
    - name: Check test results
      run: |
        if grep -q "Failures: [1-9]" target/surefire-reports/*.txt 2>/dev/null || \
           grep -q "Errors: [1-9]" target/surefire-reports/*.txt 2>/dev/null; then
          echo "❌ Tests failed!"
          exit 1
        fi
        echo "✅ All tests passed!"

  # 代码覆盖率
  coverage:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Generate coverage report
      run: mvn clean test jacoco:report -B
    
    - name: Check coverage threshold
      run: |
        COVERAGE=$(grep -o 'percent="[0-9]*"' target/site/jacoco/index.html | head -1 | grep -o '[0-9]*')
        echo "Current coverage: ${COVERAGE}%"
        if [ "$COVERAGE" -lt "80" ]; then
          echo "❌ Coverage ${COVERAGE}% is below threshold 80%"
          exit 1
        fi
        echo "✅ Coverage ${COVERAGE}% meets threshold 80%"
      continue-on-error: true
